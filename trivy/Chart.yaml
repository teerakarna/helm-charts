  - containers
  - kubernetes
home: https://github.com/teerakarna/helm-charts
sources:
  - https://github.com/teerakarna/helm-charts
  - https://github.com/aquasecurity/trivy
maintainers:
  - name: teerakarna
    url: https://github.com/teerakarna
