suite: job
templates:
  - job.yaml
tests:
  - it: should create a Job by default
    set:
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.backoffLimit
          value: 0

  - it: should not create a Job when workloadType=cronjob
    set:
      workloadType: cronjob
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - hasDocuments:
          count: 0

  - it: should always include --connections
    set:
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --connections

  - it: should include --duration by default
    set:
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --duration
      - contains:
          path: spec.template.spec.containers[0].args
          content: "30s"

  - it: should include target URL as last arg
    set:
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[-1]
          value: "http://echo.default.svc.cluster.local/"

  - it: should set restartPolicy to Never
    set:
      target.url: "http://echo.default.svc.cluster.local/"
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never

  - it: should include --insecure when insecure=true
    set:
      target.url: "https://echo.default.svc.cluster.local/"
      bombardier.insecure: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --insecure

  - it: should include --http1 when http2=false
    set:
      target.url: "http://echo.default.svc.cluster.local/"
      bombardier.http2: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --http1
