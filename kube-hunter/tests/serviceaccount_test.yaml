suite: serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create a ServiceAccount when serviceAccount.create=false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set automountServiceAccountToken to false on the ServiceAccount
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
