apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "echoserver.fullname" . }}-test-connection"
  labels:
    {{- include "echoserver.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command:
        - curl
        - --fail
        - --silent
        - --show-error
        - "http://{{ include "echoserver.fullname" . }}:{{ .Values.service.port }}/"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
