name: Build bombardier Image

on:
  workflow_dispatch:
    inputs:
      bombardier_version:
        description: "bombardier release version to build (e.g. 1.2.6)"
        required: true
        default: "1.2.6"
      push:
        description: "Push the image to the registry"
        type: boolean
        required: true
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bombardier

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write  # required for keyless cosign signing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for scanning (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: bombardier/docker
          platforms: linux/amd64
          load: true
          build-args: BOMBARDIER_VERSION=${{ inputs.bombardier_version }}
          tags: scan-target:latest
          cache-from: type=gha

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: bombardier/docker
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          build-args: BOMBARDIER_VERSION=${{ inputs.bombardier_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.bombardier_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        if: ${{ inputs.push }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
