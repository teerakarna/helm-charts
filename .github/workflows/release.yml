name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for keyless cosign signing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Sign chart packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          packages=(.cr-release-packages/*.tgz)
          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No new packages to sign — skipping"
            exit 0
          fi
          for pkg in "${packages[@]}"; do
            bundle="${pkg}.bundle"
            release_tag=$(basename "$pkg" .tgz)
            bundle_name=$(basename "$bundle")
            # Skip if the bundle asset already exists on the release (e.g. concurrent runs).
            if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" --json assets \
                 --jq --arg n "$bundle_name" '.assets[].name | select(. == $n)' | grep -q .; then
              echo "Bundle already present on release ${release_tag} — skipping"
              continue
            fi
            echo "Signing ${pkg}"
            cosign sign-blob --bundle "$bundle" --yes "$pkg"
            gh release upload "$release_tag" "$bundle" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            echo "Bundle uploaded to release ${release_tag}"
          done
