suite: serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should not automount service account token
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include IRSA annotation when set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/scoutsuite
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/scoutsuite
