suite: job
templates:
  - job.yaml
tests:
  - it: should not create a Job by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a Job when workloadType=job
    set:
      workloadType: job
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.backoffLimit
          value: 0

  - it: should set restartPolicy to Never for Job
    set:
      workloadType: job
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never

  - it: should run the load command in Job mode
    set:
      workloadType: job
      command: load
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: load
